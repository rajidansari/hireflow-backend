services:
  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL_LOCAL: postgresql://jobportal:secret@postgres:5432/jobportal
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy


  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: jobportal
      POSTGRES_DB: jobportal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobportal"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres-data: